    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background:
                radial-gradient(ellipse at top, rgba(13, 110, 253, 0.15), transparent),
                radial-gradient(ellipse at bottom, rgba(111, 66, 193, 0.15), transparent),
                linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* Grid pattern overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(13, 110, 253, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13, 110, 253, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* Floating orbs */
        .tech-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.45;
            pointer-events: none;
        }

        .orb1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(253, 237, 13, 0.6), transparent);
            top: 10%;
            left: 15%;
            animation: float1 8s ease-in-out infinite;
        }

        .orb2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(66, 193, 193, 0.6), transparent);
            bottom: 15%;
            right: 20%;
            animation: float2 10s ease-in-out infinite;
        }

        .orb3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(221, 13, 240, 0.5), transparent);
            top: 50%;
            right: 10%;
            animation: float3 12s ease-in-out infinite;
        }



        @keyframes float1 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.5;
            }

            33% {
                transform: translate(50px, -40px) scale(1.1);
                opacity: 0.7;
            }

            66% {
                transform: translate(-30px, 30px) scale(0.9);
                opacity: 0.6;
            }
        }

        @keyframes float2 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.5;
            }

            33% {
                transform: translate(-45px, 35px) scale(1.05);
                opacity: 0.7;
            }

            66% {
                transform: translate(35px, -25px) scale(0.95);
                opacity: 0.6;
            }
        }

        @keyframes float3 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.5;
            }

            33% {
                transform: translate(-40px, -50px) scale(1.08);
                opacity: 0.65;
            }

            66% {
                transform: translate(40px, 20px) scale(0.92);
                opacity: 0.55;
            }
        }

        /* Responsive สำหรับพื้นหลัง */
        @media (max-width: 768px) {

            /* ปรับขนาด orbs ให้เล็กลงบนมือถือ */
            .orb1,
            .orb3 {
                width: 200px;
                height: 200px;
            }

            .orb2,
            .orb1 {
                width: 180px;
                height: 180px;
            }

            .orb3,
            .orb2 {
                width: 150px;
                height: 150px;
            }
        }

        @media (max-width: 480px) {

            /* ลด blur ของ orbs บนมือถือเพื่อประสิทธิภาพ */
            .tech-orb {
                filter: blur(10px);
            }

            /* ปรับขนาด orbs ให้เล็กลงอีกบนมือถือขนาดเล็ก */
            .orb1,
            .orb2 {
                width: 150px;
                height: 150px;
            }

            .orb2,
            .orb3 {
                width: 130px;
                height: 130px;
            }

            .orb3,
            .orb1 {
                width: 120px;
                height: 120px;
            }
        }

        /* ส่วน Card */
        .card-wrapper {
            width: 400px;
            height: 250px;
            perspective: 1200px;
            position: relative;
            z-index: 1;
        }

        .card {
            width: 100%;
            height: 100%;
            transition: transform 1s ease-in-out;
            transform-style: preserve-3d;
            position: relative;
            transform: rotateX(0deg) rotateY(15deg) rotateZ(0deg);
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            transition: transform 0.6s ease;
        }

        .card-wrapper:hover .card {
            transform: rotateX(10deg) rotateY(180deg) rotateZ(15deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            padding: 10px;
            z-index: 1;
        }

        .card-face::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet, red);
            background-size: 200% 200%;
            animation: rainbowBorder 8s linear infinite; /* ช้าลง + linear */
            filter: blur(15px);
            z-index: -1;
        }

        @media (max-width: 768px) {
    .card-face::before {
        filter: blur(5px);
    }
}

        @keyframes rainbowBorder {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .front .content,
        .back .content {
            background: #1a1a1a;
            width: 100%;
            height: 100%;
            border-radius: 17px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            padding: 15px;
        }

        .front .content {
            flex-direction: row;
            gap: 20px;
            text-align: left;
        }

        .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .back {
            transform: rotateY(180deg);
        }

        .back .content {
            font-size: 24px;
            text-align: center;
            flex-direction: column;
            gap: 15px;
        }

        .back a {
            margin: 0 10px;
            text-decoration: none;
        }

        .back i {
            font-size: 30px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.flipped .front {
            pointer-events: none;
        }

        .card.flipped .back {
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <!-- Tech Background Orbs -->
    <div class="tech-orb orb1"></div>
    <div class="tech-orb orb2"></div>
    <div class="tech-orb orb3"></div>

    <!-- Card -->
    <main class="card-wrapper">
        <div class="card">
            <div class="card-face front">
                <div class="content">
                    <img src="https://yt3.googleusercontent.com/ytc/AIdro_kA0irHAG_1C1K1Hv-TZUGCIYO9i6ckfRARIcXMj8m_19g2=s900-c-k-c0x00ffffff-no-rj"
                        alt="รวม WebApp" class="profile-img">
                    <div class="info">
                        <div><strong>Sumett Ampornsak</strong></div>
                    </div>
                </div>
            </div>
            <div class="card-face back">
                <div class="content">
                    <div class="social-links">
                        <a href="https://www.facebook.com/Sumettstudio1" target="_blank">
                            <i class="fab fa-facebook-f" style="color: #3b5998;"></i>
                        </a>
                        <a href="https://github.com/SumettAmpornsak?tab=repositories" target="_blank">
                            <i class="fab fa-github" style="color: #333;"></i>
                        </a>
                        <a href="https://www.youtube.com/@Sumettstudio" target="_blank">
                            <i class="fab fa-youtube" style="color: #FF0000;"></i>
                        </a>
                    </div>
                    <a href="https://appcenter-nine.vercel.app/" class="btn btn-outline-primary btn-sm"
                        target="_blank">คลิกที่นี่เพื่อเข้าสู่ <br> App Center</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const card = document.querySelector('.card');

        document.querySelector('.front').addEventListener('click', function () {
            card.classList.add('flipped');
        });

        document.querySelector('.back').addEventListener('click', function (e) {
            // ถ้าคลิกที่ปุ่มหรือ link → ไม่ต้อง flip
            if (e.target.closest('a')) return;

            // คลิกที่พื้นที่ว่าง → flip กลับ
            card.classList.remove('flipped');
        });
    </script>
    
</body>
